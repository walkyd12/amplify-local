services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    # Named volumes are created root-owned; the image's `dynamodblocal` user
    # (uid 1000) can't write to them. Running as root here is fine — this is
    # a local-dev-only container with no network exposure beyond localhost.
    user: "0:0"
    command: ${DYNAMODB_COMMAND:--jar DynamoDBLocal.jar -sharedDb -dbPath /data}
    ports:
      - "${DYNAMODB_PORT:-8000}:8000"
    volumes:
      - dynamodb-data:/data

volumes:
  dynamodb-data:
